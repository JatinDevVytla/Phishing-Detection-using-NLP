<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Phishing Detector</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f1117;
      --surface:   #181c27;
      --border:    #252a38;
      --text:      #e8eaf0;
      --muted:     #6b7280;
      --accent:    #4f8ef7;
      --danger:    #f25c5c;
      --safe:      #3ecf74;
      --warn:      #f5a623;
      --radius:    10px;
    }

    body {
      width: 340px;
      min-height: 420px;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      overflow-x: hidden;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }
    .header-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #4f8ef7, #8b5cf6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }
    .header-title { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
    .header-sub   { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--safe);
      margin-left: auto; flex-shrink: 0;
      box-shadow: 0 0 6px var(--safe);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; } 50% { opacity: 0.4; }
    }

    /* ── Main content ── */
    .content { padding: 14px 16px; }

    /* ── Status card ── */
    .status-card {
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 14px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }
    .status-card::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0.07;
    }
    .status-card.idle    { background: var(--surface); }
    .status-card.safe    { border-color: var(--safe);   background: rgba(62,207,116,0.07); }
    .status-card.phishing{ border-color: var(--danger); background: rgba(242,92,92,0.07); }
    .status-card.scanning{ border-color: var(--accent); background: rgba(79,142,247,0.07); }

    .status-header {
      display: flex; align-items: center; gap: 10px; margin-bottom: 8px;
    }
    .status-emoji { font-size: 22px; line-height: 1; }
    .status-label { font-size: 16px; font-weight: 700; }
    .status-label.safe     { color: var(--safe); }
    .status-label.phishing { color: var(--danger); }
    .status-label.idle     { color: var(--muted); }
    .status-label.scanning { color: var(--accent); }

    .status-sub { font-size: 12px; color: var(--muted); line-height: 1.5; }

    /* ── Confidence bar ── */
    .conf-row {
      display: flex; justify-content: space-between;
      align-items: center; margin: 10px 0 4px;
      font-size: 11px; color: var(--muted);
    }
    .conf-bar-bg {
      height: 6px; border-radius: 3px;
      background: var(--border); overflow: hidden;
    }
    .conf-bar-fill {
      height: 100%; border-radius: 3px;
      transition: width 0.6s cubic-bezier(.4,0,.2,1);
    }
    .conf-bar-fill.safe     { background: var(--safe); }
    .conf-bar-fill.phishing { background: var(--danger); }
    .conf-bar-fill.scanning { background: var(--accent); animation: shimmer 1.2s infinite; }

    @keyframes shimmer {
      0%   { opacity: 1; }
      50%  { opacity: 0.4; }
      100% { opacity: 1; }
    }

    /* ── Risk flags ── */
    .flags-section { margin-bottom: 14px; }
    .section-title {
      font-size: 10px; font-weight: 600; letter-spacing: 0.8px;
      color: var(--muted); text-transform: uppercase; margin-bottom: 8px;
    }
    .flag-list { display: flex; flex-direction: column; gap: 6px; }
    .flag-item {
      display: flex; align-items: flex-start; gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      font-size: 12px;
      line-height: 1.4;
      animation: fadeIn 0.3s ease;
    }
    .flag-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Scan button ── */
    .scan-btn {
      width: 100%;
      padding: 11px;
      background: linear-gradient(135deg, #4f8ef7, #7c5cf6);
      color: white;
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }
    .scan-btn:hover  { opacity: 0.9; }
    .scan-btn:active { transform: scale(0.98); }
    .scan-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }

    /* ── Footer ── */
    .footer {
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .footer-text { font-size: 10px; color: var(--muted); }
    .footer-link {
      font-size: 10px; color: var(--accent);
      text-decoration: none; cursor: pointer;
    }
    .footer-link:hover { text-decoration: underline; }

    /* ── Backend status ── */
    .backend-row {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      margin-bottom: 14px;
      font-size: 11px;
      color: var(--muted);
    }
    .backend-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .backend-dot.online  { background: var(--safe);   box-shadow: 0 0 4px var(--safe); }
    .backend-dot.offline { background: var(--danger); box-shadow: 0 0 4px var(--danger); }

    /* ── No email placeholder ── */
    .placeholder {
      text-align: center;
      padding: 20px 0;
      color: var(--muted);
    }
    .placeholder-icon { font-size: 32px; margin-bottom: 8px; }
    .placeholder-text { font-size: 12px; line-height: 1.5; }

    /* ── Mono text ── */
    .mono { font-family: 'DM Mono', monospace; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-icon">🛡️</div>
    <div>
      <div class="header-title">Phishing Detector</div>
      <div class="header-sub">AI-powered email protection</div>
    </div>
    <div class="status-dot" id="liveDot" title="Backend status"></div>
  </div>

  <!-- Content -->
  <div class="content">

    <!-- Backend status row -->
    <div class="backend-row" id="backendRow">
      <div class="backend-dot offline" id="backendDot"></div>
      <span id="backendStatus">Checking backend connection…</span>
    </div>

    <!-- Status card -->
    <div class="status-card idle" id="statusCard">
      <div class="status-header">
        <span class="status-emoji" id="statusEmoji">📭</span>
        <span class="status-label idle" id="statusLabel">No email open</span>
      </div>
      <div class="status-sub" id="statusSub">
        Open an email in Gmail, then click Scan.
      </div>

      <!-- Confidence bar (hidden until scan) -->
      <div id="confSection" style="display:none; margin-top:10px;">
        <div class="conf-row">
          <span>Confidence</span>
          <span id="confValue" class="mono">—</span>
        </div>
        <div class="conf-bar-bg">
          <div class="conf-bar-fill safe" id="confBar" style="width:0%"></div>
        </div>
      </div>
    </div>

    <!-- Risk flags -->
    <div class="flags-section" id="flagsSection" style="display:none;">
      <div class="section-title">Risk Signals Detected</div>
      <div class="flag-list" id="flagList"></div>
    </div>

    <!-- Placeholder when no email detected -->
    <div class="placeholder" id="placeholder">
      <div class="placeholder-icon">✉️</div>
      <div class="placeholder-text">
        Open an email in Gmail<br>and press Scan to analyse it.
      </div>
    </div>

    <!-- Scan button -->
    <button class="scan-btn" id="scanBtn">🔍 Scan Current Email</button>

  </div>

  <!-- Footer -->
  <div class="footer">
    <span class="footer-text">Powered by DistilBERT · Local inference</span>
    <a class="footer-link" id="reportLink">Report false result</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
